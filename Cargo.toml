[package]
name = "seaweedfs-k8s-operator"
version = "0.1.0"
edition = "2024"

[dependencies]
tonic = "0.14.5"
prost = "0.14.3"
tonic-prost = "0.14.5"
tokio = { version = "1.52.1", features = ["full"] }
thiserror = "2.0.18"
tracing = "0.1.44"
temp-dir = "0.2.0"
rand = "0.10.1"
test-log = { version = "0.2.20", features = ["trace"] }
serde = { version = "1.0.228", features = ["derive"] }

[build-dependencies]
tonic-prost-build = "0.14.5"